# GitHub Actions — BidPilot CI (frontend + PostgreSQL backend)

name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Frontend tests (run 1/3)
        run: npm test
      - name: Frontend tests (run 2/3)
        run: npm test
      - name: Frontend tests (run 3/3)
        run: npm test
      - run: npm run build

  backend-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bidpilot
          POSTGRES_PASSWORD: bidpilot_test
          POSTGRES_DB: bidpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bidpilot -d bidpilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://bidpilot:bidpilot_test@127.0.0.1:5432/bidpilot_test
      DATABASE_URL_TEST: postgresql+psycopg://bidpilot:bidpilot_test@127.0.0.1:5432/bidpilot_test
      DATABASE_URL: postgresql+psycopg://bidpilot:bidpilot_test@127.0.0.1:5432/bidpilot_test
      EVALUATION_ALLOW_FAKE: "1"
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check app tests
      - name: Ruff format
        run: ruff format --check app tests
      - name: Compileall
        run: python -m compileall app tests -q
      - name: Mypy
        run: mypy app
      - name: Alembic single head
        run: |
          heads=$(alembic heads | wc -l)
          test "$heads" -eq 1
          alembic heads
      - name: Alembic upgrade / downgrade / upgrade
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head
      - name: Alembic offline SQL
        run: alembic upgrade head --sql > /tmp/alembic.sql && test -s /tmp/alembic.sql
      - name: Agent + compliance + visibility + demo
        run: |
          pytest -q \
            tests/test_agent_unified_events.py \
            tests/test_agent_event_sequence.py \
            tests/test_agent_midrun_visibility.py \
            tests/test_agent_lifecycle_hardening.py \
            tests/test_agent_async_permissions.py \
            tests/test_agent_persist_attempt_graph.py \
            tests/test_agent_api.py \
            tests/test_agent_sse.py \
            tests/test_compliance_api.py \
            tests/test_compliance_engine.py \
            tests/test_demo_import.py \
            --tb=short
      - name: Evaluation center
        run: |
          pytest -q \
            tests/test_evaluation_suite.py \
            tests/test_evaluation_metrics.py \
            tests/test_evaluation_runner.py \
            tests/test_evaluation_api.py \
            tests/test_evaluation_permissions.py \
            tests/test_evaluation_leakage.py \
            --tb=short
      - name: Full backend suite
        run: pytest -q --tb=line
