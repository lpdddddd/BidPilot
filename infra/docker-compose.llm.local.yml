# Local-weights override for the optional `llm` profile (Base path only).
# Only use when LLM_MODEL_PATH is a non-empty host directory with config.json.
#
# From repository root (Base-only local):
#   export LLM_MODEL_PATH=/absolute/path/to/Qwen3-8B
#   docker compose --env-file .env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.llm.yml \
#     -f infra/docker-compose.llm.local.yml \
#     --profile llm up -d
#
# Local + Course LoRA (apply local *after* lora so serve path stays /models/llm;
# entrypoint appends --enable-lora / --lora-modules when LLM_ENABLE_LORA=true):
#   bash scripts/check_lora_adapter.sh
#   docker compose --env-file .env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.llm.yml \
#     -f infra/docker-compose.llm.lora.yml \
#     -f infra/docker-compose.llm.local.yml \
#     --profile llm up -d
#
# Do not use this file with an empty LLM_MODEL_PATH (Docker rejects empty binds).
# Entrypoint is inherited from docker-compose.llm.yml.
# LoRA volume comes from llm.lora.yml; LoRA CLI flags are ensured by the entrypoint.

services:
  vllm-qwen3:
    environment:
      LLM_MODEL_PATH: /models/llm
    volumes:
      - type: bind
        source: ${LLM_MODEL_PATH:?LLM_MODEL_PATH must be set to a host weights directory}
        target: /models/llm
        read_only: true
    command:
      - serve
      - /models/llm
      - --served-model-name
      - ${LLM_BASE_SERVED_NAME:-${LLM_MODEL:-bidpilot-qwen3-8b}}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "16384"
      - --enable-prefix-caching
