# Optional vLLM profile — Hugging Face Hub id mode (no local weight mount).
# Not started by `make infra-up`. Requires NVIDIA GPU + nvidia-container-toolkit.
#
# Shared env with scripts/serve_qwen3_vllm.sh:
#   LLM_MODEL          served name (backend calls this)
#   LLM_MODEL_SOURCE   Hub repo id (default Qwen/Qwen3-8B)
#   LLM_BASE_URL       http://localhost:8001/v1
#
# Hub mode (downloads/caches via HF_HOME):
#   docker compose --env-file .env \
#     -f infra/docker-compose.yml -f infra/docker-compose.llm.yml \
#     --profile llm up -d
#
# Local weights mode (mount LLM_MODEL_PATH — must be non-empty and valid):
#   docker compose --env-file .env \
#     -f infra/docker-compose.yml -f infra/docker-compose.llm.yml \
#     -f infra/docker-compose.llm.local.yml \
#     --profile llm up -d
#
# Then set LLM_ENABLED=true on the API process.

services:
  vllm-qwen3:
    profiles: ["llm"]
    image: vllm/vllm-openai:latest
    container_name: bidpilot-vllm-qwen3
    restart: unless-stopped
    runtime: nvidia
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${LLM_CUDA_VISIBLE_DEVICES:-0}
      LLM_MODEL: ${LLM_MODEL:-bidpilot-qwen3-8b}
      LLM_MODEL_SOURCE: ${LLM_MODEL_SOURCE:-Qwen/Qwen3-8B}
    ports:
      - "${LLM_PORT:-8001}:8000"
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    command:
      - ${LLM_MODEL_SOURCE:-Qwen/Qwen3-8B}
      - --served-model-name
      - ${LLM_MODEL:-bidpilot-qwen3-8b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "16384"
      - --enable-prefix-caching
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
