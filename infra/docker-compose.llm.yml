# Optional vLLM profile — Base-only (Hugging Face Hub id mode, no local weight mount).
# Not started by `make infra-up`. Requires NVIDIA GPU + nvidia-container-toolkit.
#
# IMPORTANT — run Compose from the **repository root** (not from infra/):
#
#   Base-only:
#     docker compose --env-file .env \
#       -f infra/docker-compose.yml -f infra/docker-compose.llm.yml \
#       --profile llm up -d
#
#   With Course LoRA (add overlay):
#     bash scripts/check_lora_adapter.sh
#     docker compose --env-file .env \
#       -f infra/docker-compose.yml -f infra/docker-compose.llm.yml \
#       -f infra/docker-compose.llm.lora.yml \
#       --profile llm up -d
#
# Local weights mode (base path only; add llm.lora.yml for LoRA):
#   -f infra/docker-compose.llm.local.yml  (requires LLM_MODEL_PATH)
#   local + LoRA: llm.yml + llm.local.yml + llm.lora.yml
#
# Entrypoint ALWAYS runs scripts/vllm_compose_entrypoint.sh before vLLM.
# LLM_ENABLE_LORA defaults to false here; LoRA overlay sets it true.
# When false, entrypoint strips any leftover LoRA CLI flags from argv.

services:
  vllm-qwen3:
    profiles: ["llm"]
    image: vllm/vllm-openai:latest
    container_name: bidpilot-vllm-qwen3
    restart: unless-stopped
    runtime: nvidia
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${LLM_CUDA_VISIBLE_DEVICES:-0}
      BIDPILOT_ROOT: /bidpilot
      BIDPILOT_BACKEND: /bidpilot/backend
      # Literal false so host .env cannot force LoRA onto Base-only compose.
      # Enable LoRA only via docker-compose.llm.lora.yml overlay.
      LLM_ENABLE_LORA: "false"
      LLM_MODEL: ${LLM_MODEL:-bidpilot-qwen3-8b}
      LLM_MODEL_SOURCE: ${LLM_MODEL_SOURCE:-Qwen/Qwen3-8B}
      LLM_BASE_SERVED_NAME: ${LLM_BASE_SERVED_NAME:-${LLM_MODEL:-bidpilot-qwen3-8b}}
      LLM_LORA_SERVED_NAME: ${LLM_LORA_SERVED_NAME:-${LLM_LORA_MODULE_NAME:-bidpilot-qwen3-8b-course-lora}}
      LLM_MAX_LORA_RANK: ${LLM_MAX_LORA_RANK:-16}
    ports:
      - "${LLM_PORT:-8001}:8000"
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      - type: bind
        source: ../scripts
        target: /bidpilot/scripts
        read_only: true
      - type: bind
        source: ../backend
        target: /bidpilot/backend
        read_only: true
    entrypoint:
      - /bin/bash
      - /bidpilot/scripts/vllm_compose_entrypoint.sh
    command:
      - serve
      - ${LLM_MODEL_SOURCE:-Qwen/Qwen3-8B}
      - --served-model-name
      - ${LLM_BASE_SERVED_NAME:-${LLM_MODEL:-bidpilot-qwen3-8b}}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "16384"
      - --enable-prefix-caching
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
