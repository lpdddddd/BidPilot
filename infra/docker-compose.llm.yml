# Optional vLLM profile — Hugging Face Hub id mode (no local weight mount).
# Not started by `make infra-up`. Requires NVIDIA GPU + nvidia-container-toolkit.
#
# IMPORTANT — run Compose from the **repository root** (not from infra/):
#   docker compose --env-file .env \
#     -f infra/docker-compose.yml -f infra/docker-compose.llm.yml \
#     --profile llm config
#
# Default LoRA bind uses a path **relative to this compose file** (`infra/`):
#   ../training/llamafactory/outputs/qwen3_8b_lora_course
# Override with LLM_LORA_HOST_PATH (absolute or repo-root-relative resolved by you).
# Container mount is always: /models/bidpilot-course-lora
#
# Local weights mode:
#   -f infra/docker-compose.llm.local.yml  (requires LLM_MODEL_PATH)
#
# Preflight (host Adapter must exist before `up`):
#   bash scripts/check_lora_adapter.sh

services:
  vllm-qwen3:
    profiles: ["llm"]
    image: vllm/vllm-openai:latest
    container_name: bidpilot-vllm-qwen3
    restart: unless-stopped
    runtime: nvidia
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${LLM_CUDA_VISIBLE_DEVICES:-0}
      LLM_MODEL: ${LLM_MODEL:-bidpilot-qwen3-8b}
      LLM_MODEL_SOURCE: ${LLM_MODEL_SOURCE:-Qwen/Qwen3-8B}
      LLM_BASE_SERVED_NAME: ${LLM_BASE_SERVED_NAME:-${LLM_MODEL:-bidpilot-qwen3-8b}}
      LLM_LORA_SERVED_NAME: ${LLM_LORA_SERVED_NAME:-${LLM_LORA_MODULE_NAME:-bidpilot-qwen3-8b-course-lora}}
    ports:
      - "${LLM_PORT:-8001}:8000"
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      - type: bind
        # Relative default is vs THIS file's directory (infra/), hence ../training/...
        source: ${LLM_LORA_HOST_PATH:-../training/llamafactory/outputs/qwen3_8b_lora_course}
        target: ${LLM_LORA_CONTAINER_PATH:-/models/bidpilot-course-lora}
        read_only: true
    command:
      - ${LLM_MODEL_SOURCE:-Qwen/Qwen3-8B}
      - --served-model-name
      - ${LLM_BASE_SERVED_NAME:-${LLM_MODEL:-bidpilot-qwen3-8b}}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "16384"
      - --enable-prefix-caching
      - --enable-lora
      - --max-loras
      - "2"
      - --max-lora-rank
      - "${LLM_MAX_LORA_RANK:-16}"
      - --lora-modules
      - "${LLM_LORA_SERVED_NAME:-${LLM_LORA_MODULE_NAME:-bidpilot-qwen3-8b-course-lora}}=${LLM_LORA_CONTAINER_PATH:-/models/bidpilot-course-lora}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
