# Minimal PostgreSQL for BidPilot integration tests only.
# Usage:
#   docker compose -f infra/docker-compose.test.yml up -d
#   export TEST_DATABASE_URL='postgresql+psycopg://bidpilot:bidpilot_test@127.0.0.1:5433/bidpilot_test'
#   cd backend && alembic upgrade head && pytest
#
# Tear down (does not touch the main infra postgres volume):
#   docker compose -f infra/docker-compose.test.yml down -v

name: bidpilot-test

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: bidpilot-postgres-test
    environment:
      POSTGRES_USER: bidpilot
      POSTGRES_PASSWORD: bidpilot_test
      POSTGRES_DB: bidpilot_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidpilot -d bidpilot_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
