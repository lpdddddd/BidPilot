### BidPilot Qwen3-8B LoRA SFT template (no quantization)
### Update model_name_or_path / output_dir / dataset_dir for your server.

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: bidpilot_sample_sharegpt
dataset_dir: data
template: qwen3
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: outputs/qwen3_8b_lora_sft
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000

### eval
val_size: 0.05
eval_strategy: steps
eval_steps: 200
per_device_eval_batch_size: 1
